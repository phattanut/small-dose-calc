<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Small Dose Calculator - รพ.น่าน</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f3f4f6; }
        .loader { border-top-color: #1DB446; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 flex justify-center items-start min-h-screen">

    <div class="w-full max-w-md bg-white rounded-xl shadow-lg overflow-hidden">
        <div class="bg-green-600 p-4 text-center">
            <h1 class="text-white text-xl font-bold">💉 Small Dose Calculator</h1>
            <p class="text-green-100 text-sm">โรงพยาบาลน่าน</p>
        </div>

        <div class="p-6">
            <form id="calcForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">1. ค้นหายา (Search Drug)</label>
                    <input type="text" id="drugInput" list="drugOptions" placeholder="พิมพ์ชื่อยา เช่น mero, ampi..." class="w-full border border-gray-300 p-3 rounded-lg focus:ring-2 focus:ring-green-500 outline-none transition" required>
                    <datalist id="drugOptions"></datalist>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">2. ระบุขนาดยา (Dose)</label>
                    <div class="flex">
                        <input type="number" id="doseInput" step="any" placeholder="ระบุตัวเลข" class="w-full border border-gray-300 p-3 rounded-l-lg focus:ring-2 focus:ring-green-500 outline-none text-lg" required disabled>
                        <div class="bg-gray-100 border border-l-0 border-gray-300 text-gray-600 p-3 rounded-r-lg font-bold w-24 flex items-center justify-center transition-all duration-300" id="unitLabel">-</div>
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-green-500 text-white font-bold py-3 rounded-lg shadow hover:bg-green-600 transition disabled:opacity-50 flex justify-center items-center" disabled>
                    <span id="btnText">คำนวณการผสมยา</span>
                    <div id="btnSpinner" class="hidden loader rounded-full border-2 border-t-2 border-white h-5 w-5 ml-2"></div>
                </button>
            </form>

            <div id="resultContainer" class="mt-6 hidden">
                <div class="border-t pt-4 space-y-4">
                    <h2 class="text-lg font-bold text-gray-800">📊 ผลการคำนวณเบื้องต้น:</h2>
                    <div id="resultBox" class="bg-blue-50 p-4 rounded-lg border border-blue-200 text-sm text-blue-900 whitespace-pre-wrap font-medium">
                        </div>
                    
                    <button id="sendToChatBtn" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg shadow hover:bg-blue-700 transition flex justify-center items-center">
                        <span>📤 ส่งเข้าแชท & ปิดหน้าต่าง</span>
                    </button>
                    <p class="text-center text-[10px] text-gray-400">เมื่อกดส่ง หน้าต่างนี้จะปิดลงอัตโนมัติ</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "/api/proxy"; 
        const MY_LIFF_ID = "2009008059-pFqIjvxl"; // 🚨 LIFF ID

        let drugDatabase = [];
        let lastFlexMessage = null;

        const drugInput = document.getElementById('drugInput');
        const drugOptions = document.getElementById('drugOptions');
        const unitLabel = document.getElementById('unitLabel');
        const doseInput = document.getElementById('doseInput');
        const submitBtn = document.getElementById('submitBtn');
        const resultContainer = document.getElementById('resultContainer');
        const resultBox = document.getElementById('resultBox');
        const sendToChatBtn = document.getElementById('sendToChatBtn');

        // เริ่มต้นระบบ
        async function initializeApp() {
            try {
                await liff.init({ liffId: MY_LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); return; }
                await fetchDrugs();
            } catch (error) {
                console.error("LIFF Init Error", error);
            }
        }

        // โหลดข้อมูลยา
        async function fetchDrugs() {
            try {
                const response = await fetch(`${API_URL}?action=getDrugs`);
                drugDatabase = await response.json();
                drugOptions.innerHTML = '';
                drugDatabase.forEach(drug => {
                    let option = document.createElement('option');
                    option.value = drug.name;
                    drugOptions.appendChild(option);
                });
                doseInput.disabled = false;
                submitBtn.disabled = false;
            } catch (error) {
                console.error("Fetch Drugs Error", error);
            }
        }

        // ตรวจจับชื่อยาเพื่อล็อกหน่วย
        drugInput.addEventListener('input', function() {
            const match = drugDatabase.find(d => d.name === this.value);
            if (match) {
                unitLabel.innerText = match.unit;
                unitLabel.className = "bg-green-100 border border-l-0 border-gray-300 text-green-700 p-3 rounded-r-lg font-bold w-24 flex items-center justify-center";
            } else {
                unitLabel.innerText = '-';
                unitLabel.className = "bg-gray-100 border border-l-0 border-gray-300 text-gray-600 p-3 rounded-r-lg font-bold w-24 flex items-center justify-center";
            }
        });

        // กดปุ่มคำนวณ
        document.getElementById('calcForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const profile = await liff.getProfile();
            
            submitBtn.disabled = true;
            document.getElementById('btnText').innerText = "กำลังคำนวณ...";
            document.getElementById('btnSpinner').classList.remove('hidden');
            resultContainer.classList.add('hidden');

            const payload = {
                events: [{
                    type: "postback",
                    replyToken: "web_request",
                    source: { userId: profile.userId },
                    postback: {
                        data: `action=calc&drug=${encodeURIComponent(drugInput.value)}&dose=${doseInput.value}&unit=${unitLabel.innerText}`
                    }
                }]
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                lastFlexMessage = result; // เก็บ Flex Message ไว้

                // แสดง Preview สั้นๆ ในหน้าจอ
                resultBox.innerText = `✅ ตรวจสอบข้อมูล:\n💊 ${drugInput.value}\n⚖️ ขนาด: ${doseInput.value} ${unitLabel.innerText}\n\nระบบคำนวณแผนการเตรียมยาเสร็จแล้ว\nกดปุ่มด้านล่างเพื่อส่งผลเข้าแชทค่ะ`;
                resultContainer.classList.remove('hidden');
                
            } catch (error) {
                alert("เกิดข้อผิดพลาด: " + error.message);
            } finally {
                document.getElementById('btnText').innerText = "คำนวณการผสมยา";
                document.getElementById('btnSpinner').classList.add('hidden');
                submitBtn.disabled = false;
            }
        });

        // 🔥 ปุ่มส่งเข้า Chat และปิดหน้าต่างอัตโนมัติ
        sendToChatBtn.addEventListener('click', function() {
            if (!lastFlexMessage) return;

            // เปลี่ยนสถานะปุ่มขณะส่ง
            this.disabled = true;
            this.innerText = "กำลังส่งข้อมูล...";

            liff.sendMessages([lastFlexMessage])
                .then(() => {
                    // เมื่อส่งสำเร็จ สั่งปิดหน้าต่าง LIFF ทันที
                    liff.closeWindow();
                })
                .catch((err) => {
                    alert("ส่งเข้าแชทไม่สำเร็จ: " + err.message);
                    this.disabled = false;
                    this.innerText = "📤 ส่งเข้าแชท & ปิดหน้าต่าง";
                });
        });

        initializeApp();
    </script>
</body>
</html>
