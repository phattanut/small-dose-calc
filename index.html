<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Small Dose Calculator - รพ.น่าน</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f3f4f6; }
        .loader { border-top-color: #1DB446; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 flex justify-center items-start min-h-screen">

    <div class="w-full max-w-md bg-white rounded-xl shadow-lg overflow-hidden">
        <div class="bg-green-600 p-4 text-center">
            <h1 class="text-white text-xl font-bold">💉 Small Dose Calculator</h1>
            <p class="text-green-100 text-sm">โรงพยาบาลน่าน</p>
        </div>

        <div class="p-6">
            <form id="calcForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">1. เลือกยา (Drug Name)</label>
                    <select id="drugSelect" class="w-full border border-gray-300 p-3 rounded-lg focus:ring-2 focus:ring-green-500 outline-none" required>
                        <option value="">กำลังเริ่มต้นระบบ...</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">2. ระบุขนาดยา (Dose)</label>
                    <div class="flex">
                        <input type="number" id="doseInput" step="any" placeholder="ระบุตัวเลข" class="w-full border border-gray-300 p-3 rounded-l-lg focus:ring-2 focus:ring-green-500 outline-none text-lg" required disabled>
                        <div class="bg-gray-100 border border-l-0 border-gray-300 text-gray-600 p-3 rounded-r-lg font-bold w-24 flex items-center justify-center" id="unitLabel">-</div>
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-green-500 text-white font-bold py-3 rounded-lg shadow hover:bg-green-600 transition disabled:opacity-50 flex justify-center items-center" disabled>
                    <span id="btnText">คำนวณการผสมยา</span>
                    <div id="btnSpinner" class="hidden loader rounded-full border-2 border-t-2 border-white h-5 w-5 ml-2"></div>
                </button>
            </form>

            <div id="resultContainer" class="mt-6 hidden">
                <div class="border-t pt-4">
                    <h2 class="text-lg font-bold text-gray-800 mb-2">📊 ผลการคำนวณ:</h2>
                    <div id="resultBox" class="bg-gray-50 p-4 rounded-lg border border-gray-200 text-sm whitespace-pre-wrap"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "/api/proxy"; 
        // 🚨ใส่ LIFF ID
        const MY_LIFF_ID = "2009008059-pFqIjvxl"; 

        const drugSelect = document.getElementById('drugSelect');
        const unitLabel = document.getElementById('unitLabel');
        const doseInput = document.getElementById('doseInput');
        const submitBtn = document.getElementById('submitBtn');
        const resultContainer = document.getElementById('resultContainer');
        const resultBox = document.getElementById('resultBox');

        async function initializeApp() {
            try {
                // 1. เริ่มต้น LIFF
                await liff.init({ liffId: MY_LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login();
                    return;
                }
                // 2. เมื่อ LIFF พร้อมแล้วค่อยโหลดรายชื่อยา
                await fetchDrugs();
            } catch (error) {
                console.error("LIFF Init Error", error);
                resultBox.innerText = "❌ ไม่สามารถเชื่อมต่อกับ LINE ได้";
                resultContainer.classList.remove('hidden');
            }
        }

        async function fetchDrugs() {
            try {
                const response = await fetch(`${API_URL}?action=getDrugs`);
                const drugs = await response.json();
                drugSelect.innerHTML = '<option value="">-- เลือกยา --</option>';
                drugs.forEach(drug => {
                    let option = document.createElement('option');
                    option.value = drug.name;
                    option.text = drug.name;
                    option.setAttribute('data-unit', drug.unit);
                    drugSelect.appendChild(option);
                });
                doseInput.disabled = false;
                submitBtn.disabled = false;
            } catch (error) {
                drugSelect.innerHTML = '<option value="">โหลดข้อมูลล้มเหลว</option>';
            }
        }

        drugSelect.addEventListener('change', function() {
            const selectedOption = this.options[this.selectedIndex];
            if (this.value) {
                const unit = selectedOption.getAttribute('data-unit');
                unitLabel.innerText = unit;
                unitLabel.classList.replace('bg-gray-100', 'bg-green-100');
                unitLabel.classList.replace('text-gray-600', 'text-green-700');
            } else {
                unitLabel.innerText = '-';
                unitLabel.classList.replace('bg-green-100', 'bg-gray-100');
                unitLabel.classList.replace('text-green-700', 'text-gray-600');
            }
        });

        document.getElementById('calcForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // ดึง Profile ของ User เพื่อบันทึกประวัติ
            const profile = await liff.getProfile();
            const userId = profile.userId;

            submitBtn.disabled = true;
            document.getElementById('btnText').innerText = "กำลังคำนวณ...";
            document.getElementById('btnSpinner').classList.remove('hidden');

            const payload = {
                events: [{
                    type: "postback",
                    replyToken: "web_request", 
                    source: { userId: userId }, // 🔥 ใช้ UserID จริงจาก LINE
                    postback: {
                        data: `action=calc&drug=${encodeURIComponent(drugSelect.value)}&dose=${doseInput.value}&unit=${unitLabel.innerText}`
                    }
                }]
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });
                const resultData = await response.json();
                
                // แสดงผล (เดี๋ยวเราค่อยมาทำฟังก์ชัน render สวยๆ วันหลังครับ)
                resultBox.innerText = "คำนวณเรียบร้อย! ข้อมูลส่งมาจากหลังบ้านครบถ้วนค่ะ";
                resultContainer.classList.remove('hidden');
            } catch (error) {
                resultBox.innerText = "❌ เกิดข้อผิดพลาด: " + error.message;
                resultContainer.classList.remove('hidden');
            } finally {
                document.getElementById('btnText').innerText = "คำนวณการผสมยา";
                document.getElementById('btnSpinner').classList.add('hidden');
                submitBtn.disabled = false;
            }
        });

        initializeApp();
    </script>
</body>
</html>
